{{ define "main" }}
<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12 space-y-12">
  <h1 class="text-3xl font-bold text-gray-900 dark:text-slate-100">特許</h1>

  {{ with .Site.Data.patents }}
  <ul class="divide-y divide-gray-100 dark:divide-slate-800">
    {{ range .items }}
      {{ partial "patent-item.html" . }}
    {{ end }}
  </ul>
  {{ end }}
</div>
{{ end }}
