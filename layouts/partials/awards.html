{{/* Awards partial */}}
{{/* Usage: {{ partial "awards.html" $admin.Params.awards }} */}}
<ul class="space-y-3">
  {{ range . }}
  <li class="flex flex-col sm:flex-row sm:items-baseline gap-1 sm:gap-4">
    <time class="text-xs text-gray-500 dark:text-slate-500 font-mono flex-shrink-0">{{ dateFormat "2006-01" .date }}</time>
    <div>
      <p class="text-sm font-medium text-gray-900 dark:text-slate-100">{{ .title }}</p>
      <p class="text-xs text-gray-500 dark:text-slate-400">{{ .awarder }}</p>
    </div>
  </li>
  {{ end }}
</ul>
