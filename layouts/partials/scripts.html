<script>
  // Dark mode toggle
  var btn = document.getElementById('dark-mode-toggle');
  var iconSun = document.getElementById('icon-sun');
  var iconMoon = document.getElementById('icon-moon');
  var html = document.documentElement;

  function updateIcons() {
    if (html.classList.contains('dark')) {
      iconSun.classList.remove('hidden');
      iconMoon.classList.add('hidden');
    } else {
      iconSun.classList.add('hidden');
      iconMoon.classList.remove('hidden');
    }
  }

  updateIcons();

  btn.addEventListener('click', function() {
    html.classList.toggle('dark');
    localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
    updateIcons();
  });

  // Mobile menu toggle
  var mobileBtn = document.getElementById('mobile-menu-btn');
  var mobileMenu = document.getElementById('mobile-menu');

  mobileBtn.addEventListener('click', function() {
    var isOpen = !mobileMenu.classList.contains('hidden');
    mobileMenu.classList.toggle('hidden', isOpen);
    mobileBtn.setAttribute('aria-expanded', String(!isOpen));
  });

  // BibTeX modal
  function showBibtex(id) {
    document.getElementById(id).classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function hideBibtex(id) {
    document.getElementById(id).classList.add('hidden');
    document.body.style.overflow = '';
  }

  function copyBibtex(contentId) {
    var text = document.getElementById(contentId).textContent;
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById(contentId).nextElementSibling;
      var original = btn.innerHTML;
      btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied!';
      setTimeout(function() { btn.innerHTML = original; }, 2000);
    });
  }

  // Close BibTeX modal on Escape
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.querySelectorAll('[id^="bib-"]:not(.hidden)').forEach(function(el) {
        el.classList.add('hidden');
        document.body.style.overflow = '';
      });
    }
  });

  // Network visualization (hero canvas, home page only)
  var canvas = document.getElementById('network-canvas');
  if (canvas) {
    var ctx = canvas.getContext('2d');
    var nodes = [];
    var nodeCount = 35;

    function resizeCanvas() {
      var hero = canvas.parentElement;
      canvas.width = hero.offsetWidth * window.devicePixelRatio;
      canvas.height = hero.offsetHeight * window.devicePixelRatio;
      canvas.style.width = hero.offsetWidth + 'px';
      canvas.style.height = hero.offsetHeight + 'px';
      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    }

    function initNodes() {
      nodes = [];
      var w = canvas.parentElement.offsetWidth;
      var h = canvas.parentElement.offsetHeight;
      for (var i = 0; i < nodeCount; i++) {
        nodes.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.15,
          vy: (Math.random() - 0.5) * 0.15,
          r: 1.5 + Math.random() * 2
        });
      }
    }

    function drawNetwork() {
      var w = canvas.parentElement.offsetWidth;
      var h = canvas.parentElement.offsetHeight;
      ctx.clearRect(0, 0, w, h);

      var isDark = html.classList.contains('dark');
      var dotColor = isDark ? 'rgba(212,176,98,0.35)' : 'rgba(184,148,62,0.25)';
      var lineColor = isDark ? 'rgba(212,176,98,0.06)' : 'rgba(184,148,62,0.08)';
      var maxDist = 140;

      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > w) n.vx *= -1;
        if (n.y < 0 || n.y > h) n.vy *= -1;
      }

      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 0.5;
      for (var i = 0; i < nodes.length; i++) {
        for (var j = i + 1; j < nodes.length; j++) {
          var dx = nodes[i].x - nodes[j].x;
          var dy = nodes[i].y - nodes[j].y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < maxDist) {
            ctx.globalAlpha = 1 - dist / maxDist;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.stroke();
          }
        }
      }
      ctx.globalAlpha = 1;

      ctx.fillStyle = dotColor;
      for (var i = 0; i < nodes.length; i++) {
        ctx.beginPath();
        ctx.arc(nodes[i].x, nodes[i].y, nodes[i].r, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(drawNetwork);
    }

    resizeCanvas();
    initNodes();
    drawNetwork();

    window.addEventListener('resize', function() {
      resizeCanvas();
      initNodes();
    });
  }
</script>
