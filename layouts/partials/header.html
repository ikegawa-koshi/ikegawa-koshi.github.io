<header class="sticky top-0 z-50" style="background: #1a1a2e; border-bottom: 1px solid rgba(255,255,255,0.06);">
  <div class="max-w-[960px] mx-auto px-6">
    <div class="flex items-center h-14">
      <a href="{{ "/" | relURL }}" class="group" style="font-family: var(--font-display); font-weight: 600; font-size: 1.05rem; color: #f0ece6; letter-spacing: 0.02em;">
        {{ .Site.Title }}
      </a>

      <div class="ml-auto flex items-center gap-1">
        <nav id="desktop-nav" class="hidden lg:flex items-center gap-1" aria-label="Main navigation">
          {{ range .Site.Menus.main }}
          <a href="{{ .URL | relURL }}" class="nav-link">{{ .Name }}</a>
          {{ end }}
        </nav>

        <div class="flex items-center gap-2">
          <!-- Dark mode toggle -->
          <button
            id="dark-mode-toggle"
            aria-label="Toggle dark mode"
            class="p-2 rounded-lg transition-colors cursor-pointer"
            style="color: rgba(240,236,230,0.55);"
            onmouseover="this.style.color='#f0ece6'; this.style.background='rgba(255,255,255,0.08)';"
            onmouseout="this.style.color='rgba(240,236,230,0.55)'; this.style.background='transparent';"
          >
            <svg id="icon-sun" class="hidden w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
            <svg id="icon-moon" class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
          </button>

          <!-- Mobile menu button -->
          <button
            id="mobile-menu-btn"
            aria-label="Open menu"
            aria-expanded="false"
            class="lg:hidden p-2 rounded-lg transition-colors cursor-pointer"
            style="color: rgba(240,236,230,0.55);"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile menu -->
    <nav id="mobile-menu" class="hidden lg:hidden pb-4 mt-2 pt-2" style="border-top: 1px solid rgba(255,255,255,0.1);" aria-label="Mobile navigation">
      <div class="flex flex-col gap-1">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}" class="nav-link">{{ .Name }}</a>
        {{ end }}
      </div>
    </nav>
  </div>
</header>
