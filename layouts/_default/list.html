{{ define "main" }}
<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="text-3xl font-bold text-gray-900 dark:text-slate-100 mb-8">{{ .Title }}</h1>
  <div class="prose prose-sm dark:prose-invert max-w-none">
    {{ .Content }}
  </div>
  {{ range .Pages }}
  <article class="mb-6">
    <h2 class="text-xl font-semibold">
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </h2>
    <time class="text-xs text-gray-500 dark:text-slate-500">{{ .Date.Format "2006-01-02" }}</time>
  </article>
  {{ end }}
</div>
{{ end }}
